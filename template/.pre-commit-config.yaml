repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
        exclude: ^Charts/|/templates/
      - id: check-merge-conflict
      # - id: end-of-file-fixer
      #
      # NOTE: any formatter / whitespace / EOL hook (e.g. end-of-file-fixer,
      # trailing-whitespace, a YAML formatter) added in future MUST exclude the
      # vendored files listed in each services/<instance>/runtime-lock.yaml.
      # Those files are content-addressed by sha256 in the lock and reformatting
      # them would change their hashes and break 'ibek pattern check'.

  - repo: local
    hooks:
      - id: tech-ui
        name: generate and validate the synoptic and component screens
        language: system
        # only do this if the techui support submodule has been added
        entry: |
          bash -c "
            if [[ -f synoptic/techui-support/techui-support.yaml ]]; then
              uvx techui-builder==0.7.2 build synoptic/techui.yaml
            fi"
        files: ^synoptic/
        pass_filenames: false

  - repo: local
    hooks:
      # Regenerate the per-instance ioc.schema.json (and rewrite the
      # config/ioc.yaml $schema header) for every instance that has a
      # config/ioc.yaml. The schema combines the base IOC schema, every
      # vendored pattern's entity models and any local *.ibek.support.yaml
      # dropped into config/.
      - id: ibek-ioc-schema
        name: generate per-instance ioc.schema.json
        language: system
        # TODO: drop the --from git pin once epics-containers/ibek#353 releases
        #       and 'ibek pattern' is available on the released ibek (PyPI).
        entry: |
          bash -c '
            for ioc in services/*/config/ioc.yaml; do
              instance=$(dirname "$(dirname "${ioc}")")
              uvx --python 3.13 \
                --from "git+https://github.com/epics-containers/ibek@runtime-pattern-vendoring" \
                ibek pattern schema "${instance}"
            done'
        files: ^services/
        pass_filenames: false

      # Verify vendored runtime-support integrity locally (mirrors CI). Runs for
      # every instance with a runtime-lock.yaml; a hash mismatch FAILS the hook
      # (vendored files are DO-NOT-EDIT). To deliberately diverge, mark the lock
      # entry 'DIRTY # <reason>'; to try a throwaway edit, 'git commit --no-verify'.
      - id: ibek-pattern-check
        name: check vendored runtime-support against runtime-lock.yaml
        language: system
        # TODO: drop the --from git pin once epics-containers/ibek#353 releases
        #       and 'ibek pattern' is available on the released ibek (PyPI).
        entry: |
          bash -c '
            for lock in services/*/runtime-lock.yaml; do
              instance=$(dirname "${lock}")
              uvx --python 3.13 \
                --from "git+https://github.com/epics-containers/ibek@runtime-pattern-vendoring" \
                ibek pattern check "${instance}"
            done'
        files: ^services/
        pass_filenames: false
